<!DOCTYPE html>
<html>
<head>
  <title>HoroLens - South Indian Horoscope</title>
  <style>
    body { font-family: Arial; margin: 50px; background: #f7f7f7; }
    form { background: #fff; padding: 20px; border-radius: 8px; width: 400px; margin: auto; }
    input, button { width: 100%; padding: 8px; margin: 10px 0; box-sizing: border-box; }
    button { background: #0078d7; color: white; border: none; cursor: pointer; }
    button:hover { background: #005fa3; }
    label { display: block; margin-top: 10px; font-weight: bold; }
    .gender-group { display: flex; gap: 20px; margin: 10px 0; }
    .gender-group label { display: inline-flex; margin: 0; font-weight: normal; align-items: center; gap: 5px; }
    .gender-group input { width: auto; margin: 0; }
    .autocomplete-container { position: relative; width: 100%; }
    .autocomplete-list { 
      position: absolute; 
      background: white; 
      border: 1px solid #ccc; 
      max-height: 200px; 
      overflow-y: auto; 
      width: 100%; 
      display: none; 
      z-index: 1000;
    }
    .autocomplete-item { 
      padding: 8px; 
      cursor: pointer; 
      border-bottom: 1px solid #eee; 
    }
    .autocomplete-item:hover,
    .autocomplete-item.active { background: #f0f0f0; }
  </style>
</head>
<body>
  <h2 align="center">🔯 HoroLens - South Indian Horoscope</h2>
  <form method="POST" action="/result">
    <label>Language:</label>
    <select name="lang">
      <option value="en" selected>English</option>
      <option value="te">Telugu</option>
    </select>
    <label>Ayanamsa:</label>
    <select name="ayanamsa">
      <option value="lahiri" selected>Lahiri</option>
      <option value="fagan-bradley">Fagan/Bradley</option>
      <option value="krishnamurti">Krishnamurti</option>
      <option value="raman">Raman</option>
      <option value="yukteshwar">Yukteshwar</option>
      <option value="true-citra">True Citra</option>
    </select>
    <label>Name:</label>
    <input type="text" name="name" value="Default" required>
    <label>Gender:</label>
    <div class="gender-group">
      <label><input type="radio" name="gender" value="male" checked> Male</label>
      <label><input type="radio" name="gender" value="female"> Female</label>
    </div>
    <label>Date of Birth (DD-MMM-YYYY):</label>
    <input type="text" name="dob" value="01-Jan-1983" pattern="\d{2}-[A-Za-z]{3}-\d{4}" required>
    <label>Time of Birth (HH:MM):</label>
    <input type="time" name="tob" value="05:48" required>
    <label>Place of Birth:</label>
    <div class="autocomplete-container">
      <input type="text" id="placeInput" name="place" value="Chirala, Andhra Pradesh" placeholder="e.g. Chennai, India" required autocomplete="off">
      <div id="autocompleteList" class="autocomplete-list"></div>
    </div>
    <button type="submit">Generate Horoscope</button>
  </form>

  <script>
    let activeIndex = -1;
    let pendingRequest = null;

    const placeInput = document.getElementById('placeInput');
    const autocompleteList = document.getElementById('autocompleteList');

    function closeAutocomplete() {
      autocompleteList.innerHTML = '';
      autocompleteList.style.display = 'none';
      activeIndex = -1;
    }

    function setActive(index) {
      const items = autocompleteList.querySelectorAll('.autocomplete-item');
      items.forEach((item, idx) => {
        item.classList.toggle('active', idx === index);
      });
      activeIndex = index;
    }

    function selectItem(item) {
      placeInput.value = item.textContent;
      closeAutocomplete();
    }

    function debounce(fn, delay = 300) {
      let timer;
      return (...args) => {
        clearTimeout(timer);
        timer = setTimeout(() => fn(...args), delay);
      };
    }

    function buildSuggestions(locations) {
      autocompleteList.innerHTML = '';
      if (!locations || locations.length === 0) {
        closeAutocomplete();
        return;
      }

      locations.forEach(location => {
        const item = document.createElement('div');
        item.className = 'autocomplete-item';
        item.textContent = location;
        item.addEventListener('click', () => selectItem(item));
        autocompleteList.appendChild(item);
      });

      autocompleteList.style.display = 'block';
      activeIndex = -1;
    }

    function fetchLocations(query) {
      if (!query.trim()) {
        closeAutocomplete();
        return;
      }
      if (pendingRequest) {
        pendingRequest.abort();
      }
      const controller = new AbortController();
      pendingRequest = controller;

      fetch(`/api/location?q=${encodeURIComponent(query)}`, { signal: controller.signal })
        .then(response => response.json())
        .then(data => buildSuggestions(data))
        .catch(error => {
          if (error.name !== 'AbortError') {
            console.error('OSM location search failed:', error);
            closeAutocomplete();
          }
        });
    }

    const debouncedFetchLocations = debounce(fetchLocations, 300);

    placeInput.addEventListener('input', function() {
      debouncedFetchLocations(this.value);
    });

    placeInput.addEventListener('keydown', function(event) {
      const items = autocompleteList.querySelectorAll('.autocomplete-item');
      if (!items.length) return;

      if (event.key === 'ArrowDown') {
        event.preventDefault();
        const nextIndex = activeIndex + 1 < items.length ? activeIndex + 1 : 0;
        setActive(nextIndex);
      } else if (event.key === 'ArrowUp') {
        event.preventDefault();
        const prevIndex = activeIndex - 1 >= 0 ? activeIndex - 1 : items.length - 1;
        setActive(prevIndex);
      } else if (event.key === 'Enter') {
        if (activeIndex >= 0) {
          event.preventDefault();
          selectItem(items[activeIndex]);
        }
      }
    });

    document.addEventListener('click', function(e) {
      if (!autocompleteList.contains(e.target) && e.target !== placeInput) {
        closeAutocomplete();
      }
    });

    placeInput.addEventListener('focus', function() {
      if (this.value.trim().length > 0) {
        buildSuggestions(this.value);
      }
    });
  </script>
</body>
</html>
